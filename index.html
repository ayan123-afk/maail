<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MA Chatbot</title>
<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }
.chat { width:350px; margin:50px auto; }
.messages { height:300px; overflow:auto; border:1px solid #333; padding:10px; }
input { width:70%; padding:10px; }
button { padding:10px; }
</style>
</head>
<body>

<div class="chat">
  <div class="messages" id="messages"></div>
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "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";

async function send() {
  const input = document.getElementById("input");
  const msgBox = document.getElementById("messages");

  const text = input.value;
  if (!text) return;

  msgBox.innerHTML += "<div>You: " + text + "</div>";
  input.value = "";

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": "http://localhost",   // important
        "X-Title": "MA Chatbot"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",  // change model (more stable)
        messages: [
          { role: "user", content: text }
        ]
      })
    });

    const data = await res.json();

    if (data.error) {
      msgBox.innerHTML += "<div style='color:red'>Error: " + data.error.message + "</div>";
      return;
    }

    const reply = data.choices?.[0]?.message?.content || "No response";

    msgBox.innerHTML += "<div style='color:lightgreen'>Bot: " + reply + "</div>";

  } catch (err) {
    msgBox.innerHTML += "<div style='color:red'>Request Failed</div>";
    console.error(err);
  }
}
</script>

</body>
</html>

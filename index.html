<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pollution AI Chatbot</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}
.box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}
</style>

</head>
<body>

<div class="box">
  <h2>🌍 Pollution AI Chatbot</h2>
  <p id="prompt"></p>
  <div id="result">Loading...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const prompt = params.get("prompt");

document.getElementById("prompt").innerText =
  "Prompt: " + (prompt || "None");

async function run() {
  const box = document.getElementById("result");

  if (!prompt) {
    box.innerText = "No prompt provided";
    return;
  }

  try {
    const res = await fetch(
      "/api?prompt=" + encodeURIComponent(prompt)
    );

    const text = await res.text();

    box.innerText = text;

  } catch (e) {
    box.innerText = "Error: " + e.message;
  }
}

run();
</script>

</body>
</html>

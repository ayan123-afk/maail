<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MA AI Chatbot</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:420px;
  background:#111;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 20px #00f;
}

#response{
  min-height:200px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">
  <h3>MA Developers AI</h3>
  <div id="response">Loading...</div>
</div>

<script>
const API_KEY = "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";

const prompt = new URLSearchParams(window.location.search).get("prompt");
const box = document.getElementById("response");

async function run(){

if(!prompt){
  box.innerHTML="❌ No prompt found";
  return;
}

try{

box.innerHTML="Thinking...";

const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
  method:"POST",
  headers:{
    "Authorization":"Bearer "+API_KEY,
    "Content-Type":"application/json",
    "HTTP-Referer":"https://localhost",
    "X-Title":"MA Chatbot"
  },
  body:JSON.stringify({
    model:"mistralai/mistral-7b-instruct:free",
    messages:[
      {role:"user",content:prompt}
    ]
  })
});

const data = await res.json();

console.log(data); // 👈 IMPORTANT (debug)

if(data.error){
  box.innerHTML="❌ "+data.error.message;
  return;
}

box.innerHTML = data.choices?.[0]?.message?.content || "No reply";

}catch(err){
box.innerHTML="❌ API failed";
console.log(err);
}

}

run();
</script>

</body>
</html>

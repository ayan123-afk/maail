<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot (OpenRouter)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1e293b;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  max-width: 70%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #334155;
}

.error {
  background: #7f1d1d;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.input-area {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 20px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>🤖 AI Chatbot (OpenRouter)</header>

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Type message..." 
         onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "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"; // 🔑 yahan apni key lagao

// best working models list
const models = [
  "openrouter/auto",
  "deepseek/deepseek-chat:free",
  "qwen/qwen-2.5-7b-instruct:free"
];

function addMessage(text, type="bot") {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const loading = addMessage("Typing...", "bot");

  let finalReply = null;

  for (let model of models) {
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: "system", content: "Reply in English." },
            { role: "user", content: message }
          ]
        })
      });

      const data = await res.json();

      // debug log
      console.log("MODEL:", model, data);

      if (data.error) {
        console.log("ERROR:", data.error.message);
        continue;
      }

      const reply = data.choices?.[0]?.message?.content;

      if (reply) {
        finalReply = reply;
        break;
      }

    } catch (err) {
      console.log("FETCH ERROR:", err);
    }
  }

  loading.remove();

  if (finalReply) {
    addMessage(finalReply, "bot");
  } else {
    addMessage("❌ Error: All models failed.\n(Check console F12)", "error");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.box {
  width: 420px;
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}

#chat {
  height: 400px;
  overflow-y: auto;
  border: 1px solid #333;
  padding: 10px;
  margin-bottom: 10px;
}

input {
  width: 75%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #3b82f6;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔎 Working Chatbot</h2>

  <div id="chat"></div>

  <input id="input">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let msg = input.value;
    if (!msg) return;

    chat.innerHTML += `<div>You: ${msg}</div>`;
    input.value = "";

    chat.innerHTML += `<div>Bot: searching...</div>`;

    let res = await fetch("http://localhost:3000/search?q=" + msg);
    let data = await res.json();

    chat.innerHTML += `<div>Bot: ${data.answer}</div>`;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header {
  padding:15px;
  background:#1e293b;
  text-align:center;
  font-size:20px;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg {
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.bot { background:#334155; }

.input {
  display:flex;
  padding:10px;
  background:#1e293b;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  margin-left:10px;
  padding:10px 20px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<header>🤖 AI Chatbot</header>

<div id="chat"></div>

<div class="input">
<input id="input" placeholder="Type..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const message = input.value;
  if(!message) return;

  add(message,"user");
  input.value="";

  add("Typing...","bot");

  const res = await fetch("https://YOUR-BACKEND-URL/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  document.querySelectorAll(".bot")[document.querySelectorAll(".bot").length-1].remove();

  add(data.reply,"bot");
}

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
